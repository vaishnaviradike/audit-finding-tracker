$kind: http-request
name: Describe
method: POST
url: 'http://127.0.0.1:5000/describe'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "text": "Sample audit finding text"
    }
description: |-
  Sends a text payload to the /describe endpoint. The middleware sanitizes the input (strips HTML, checks for prompt injection, validates characters), then returns the cleaned text.

  **Request Body:**
  - `text` (string, required): The text to be sanitized and processed. Must not be empty, must not exceed 2000 characters, must not contain HTML tags or prompt injection patterns, and must only contain safe characters (a-z, A-Z, 0-9, spaces, and common punctuation).

  **Response:**
  - `message`: "Processed successfully"
  - `clean_text`: The sanitized version of the input text.
